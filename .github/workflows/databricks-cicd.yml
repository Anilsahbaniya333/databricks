name: Databricks CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          pip install --upgrade databricks-cli

      # ✅ AUTH (Azure Service Principal) — replaces DATABRICKS_TOKEN
      - name: Configure Databricks auth (Azure SP)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          databricks configure --aad-token --host "$DATABRICKS_HOST" << EOF
          $AZURE_TENANT_ID
          $AZURE_CLIENT_ID
          $AZURE_CLIENT_SECRET
          EOF

      # ✅ DEPLOY (simple) — import repo content to a Databricks workspace folder
      # NOTE: This imports files as notebooks where possible.
      - name: Deploy notebooks to Databricks workspace folder
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        run: |
          TARGET_PATH="/Shared/databricks-cicd"

          # Create/update the folder by importing the whole repo
          databricks workspace import_dir . "$TARGET_PATH" --overwrite

          echo "Deployed repo to: $TARGET_PATH"
