name: Databricks CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade databricks-cli
          databricks --version

      # ✅ Deploy notebooks to PROD folder (Azure Service Principal auth)
      - name: Deploy notebooks to PROD folder
        env:
          PROD_PATH: /Shared/prod_my_project/notebooks

          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_AUTH_TYPE: azure-client-secret
          DATABRICKS_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          DATABRICKS_AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          DATABRICKS_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          echo "Testing auth..."
          databricks workspace list /

          echo "Creating PROD folder: $PROD_PATH"
          databricks workspace mkdirs "$PROD_PATH"

          echo "Importing notebooks from ./notebooks to $PROD_PATH"
          databricks workspace import_dir "./notebooks" "$PROD_PATH" --overwrite

          echo "✅ Deployed notebooks to: $PROD_PATH"
          databricks workspace list "$PROD_PATH"
